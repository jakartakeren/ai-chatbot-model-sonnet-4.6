<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>AI Chatbot — Claude Sonnet 4.6</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #a0a09c;
    --border-light: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.14);
    --border-strong: rgba(0,0,0,0.22);
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --blue-text: #185FA5;
    --danger: #E24B4A;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --bg-info: #0c3255;
      --text-primary: #f0efeb;
      --text-secondary: #9a9a94;
      --text-tertiary: #636360;
      --border-light: rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.2);
      --purple: #7F77DD;
      --purple-light: #26215C;
      --purple-mid: #AFA9EC;
      --teal: #5DCAA5;
      --teal-light: #04342C;
      --blue-text: #85B7EB;
    }
  }

  html { height: 100%; height: -webkit-fill-available; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-tertiary);
    display: flex; align-items: center; justify-content: center;
    height: 100%; height: -webkit-fill-available;
    overflow: hidden;
  }

  #app {
    width: 100%; max-width: 780px;
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    background: var(--bg-primary);
    border-left: 0.5px solid var(--border-light);
    border-right: 0.5px solid var(--border-light);
    overflow: hidden;
  }

  /* TOPBAR */
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 0.5px solid var(--border-light);
    background: var(--bg-primary); flex-shrink: 0; z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .bot-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-mid), var(--teal));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: white; flex-shrink: 0;
  }
  .bot-info { display: flex; flex-direction: column; gap: 1px; }
  .bot-name { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .bot-status { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); }
  .status-dot.loading { animation: pulse 1s infinite; background: #EF9F27; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .topbar-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-light); background: var(--bg-secondary);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 15px; transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--bg-primary); border-color: var(--border-mid); color: var(--text-primary); }
  .icon-btn.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple); }

  /* MEMORY PANEL */
  #memory-panel {
    max-height: 0; overflow: hidden; transition: max-height 0.25s ease;
    background: var(--bg-secondary);
  }
  #memory-panel.open { max-height: 220px; border-bottom: 0.5px solid var(--border-light); }
  .memory-inner { padding: 14px 20px; }
  .memory-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .05em; }
  .memory-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
  .memory-chip {
    background: var(--bg-primary); border: 0.5px solid var(--border-mid);
    border-radius: 20px; padding: 4px 10px 4px 12px;
    font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .chip-del { cursor: pointer; color: var(--text-tertiary); font-size: 10px; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .1s; }
  .chip-del:hover { background: var(--danger); color: white; }
  .memory-empty { font-size: 12px; color: var(--text-tertiary); font-style: italic; }
  .memory-add-row { display: flex; gap: 8px; }
  #memory-input {
    flex: 1; padding: 7px 12px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-mid); background: var(--bg-primary);
    font-family: inherit; font-size: 13px; color: var(--text-primary); outline: none; transition: border-color .15s;
  }
  #memory-input:focus { border-color: var(--purple); }
  #memory-input::placeholder { color: var(--text-tertiary); }
  .add-mem-btn {
    padding: 7px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid);
    background: transparent; cursor: pointer; font-size: 12px; font-weight: 500;
    color: var(--text-secondary); font-family: inherit; transition: all .15s;
  }
  .add-mem-btn:hover { background: var(--purple); border-color: var(--purple); color: white; }

  /* MESSAGES */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; text-align: center; padding: 40px 20px;
  }
  .empty-icon {
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-light), var(--teal-light));
    display: flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 4px;
  }
  .empty-title { font-size: 18px; font-weight: 500; color: var(--text-primary); }
  .empty-sub { font-size: 13px; color: var(--text-secondary); max-width: 300px; line-height: 1.6; }
  .suggestion-pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .s-pill {
    padding: 7px 16px; border-radius: 20px; font-size: 13px;
    border: 0.5px solid var(--border-mid); background: var(--bg-secondary);
    cursor: pointer; color: var(--text-secondary); transition: all .15s;
  }
  .s-pill:hover { background: var(--bg-primary); border-color: var(--border-strong); color: var(--text-primary); }

  .msg { display: flex; gap: 10px; max-width: 88%; animation: fadeUp .2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant, .msg.typing-row { align-self: flex-start; }
  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; margin-top: 2px;
  }
  .msg.assistant .msg-avatar, .msg.typing-row .msg-avatar { background: linear-gradient(135deg, var(--purple-mid), var(--teal)); color: white; }
  .msg.user .msg-avatar { background: var(--bg-info); color: var(--blue-text); }
  .msg-body { display: flex; flex-direction: column; gap: 4px; }
  .msg-attachments { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
  .attach-img-preview { max-width: 220px; border-radius: var(--radius-md); overflow: hidden; border: 0.5px solid var(--border-light); }
  .attach-img-preview img { width: 100%; display: block; }
  .attach-file-preview {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: var(--radius-sm);
    background: var(--bg-secondary); border: 0.5px solid var(--border-light);
    font-size: 12px; color: var(--text-secondary); max-width: 220px;
  }
  .bubble { padding: 10px 14px; font-size: 14px; line-height: 1.65; color: var(--text-primary); word-break: break-word; }
  .msg.user .bubble { background: var(--bg-info); border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg); }
  .msg.assistant .bubble { background: var(--bg-secondary); border: 0.5px solid var(--border-light); border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg); }
  .typing-bubble {
    display: flex; align-items: center; gap: 5px;
    padding: 12px 16px; background: var(--bg-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
  }
  .t-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); animation: blink 1.4s infinite; }
  .t-dot:nth-child(2){animation-delay:.2s} .t-dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
  .msg-time { font-size: 11px; color: var(--text-tertiary); padding: 0 2px; }
  .msg.user .msg-time { text-align: right; }
  .bubble pre { background: var(--bg-tertiary); border: 0.5px solid var(--border-mid); border-radius: var(--radius-sm); padding: 10px 12px; overflow-x: auto; font-family: 'DM Mono',monospace; font-size: 12px; line-height: 1.5; margin: 6px 0; white-space: pre-wrap; }
  .bubble code { background: var(--bg-tertiary); padding: 1px 5px; border-radius: 4px; font-family: 'DM Mono',monospace; font-size: 12px; }
  .bubble pre code { background: none; padding: 0; }
  .bubble strong { font-weight: 500; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
  .bubble li { margin: 2px 0; }

  /* ATTACH BAR */
  #attach-bar { display: none; padding: 8px 20px 0; flex-wrap: wrap; gap: 8px; }
  #attach-bar.visible { display: flex; }
  .a-chip {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 10px; border-radius: 20px;
    background: var(--bg-secondary); border: 0.5px solid var(--border-mid);
    font-size: 12px; color: var(--text-secondary);
  }
  .a-chip-img { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; }
  .a-chip-remove { cursor: pointer; color: var(--text-tertiary); font-size: 10px; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .1s; }
  .a-chip-remove:hover { background: var(--danger); color: white; }

  /* INPUT BAR */
  #inputbar { padding: 10px 20px 16px; border-top: 0.5px solid var(--border-light); background: var(--bg-primary); flex-shrink: 0; }
  .input-row { display: flex; align-items: flex-end; gap: 8px; }
  #file-input { display: none; }
  .round-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 0.5px solid var(--border-mid); background: var(--bg-secondary);
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-secondary); transition: all .15s;
  }
  .round-btn:hover { background: var(--bg-primary); border-color: var(--border-strong); color: var(--text-primary); }
  #msg-input {
    flex: 1; padding: 10px 16px; border-radius: 22px;
    border: 0.5px solid var(--border-mid); background: var(--bg-secondary);
    font-family: inherit; font-size: 14px; color: var(--text-primary);
    outline: none; resize: none; max-height: 120px; overflow-y: auto;
    line-height: 1.55; transition: border-color .15s, background .15s; scrollbar-width: none;
  }
  #msg-input:focus { border-color: var(--purple); background: var(--bg-primary); }
  #msg-input::placeholder { color: var(--text-tertiary); }
  #msg-input::-webkit-scrollbar { display: none; }
  #send-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: var(--purple); color: white; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all .15s;
  }
  #send-btn:hover { background: var(--purple-mid); transform: scale(1.05); }
  #send-btn:active { transform: scale(.96); }
  #send-btn:disabled { background: var(--bg-secondary); color: var(--text-tertiary); cursor: not-allowed; transform: none; }
  .footer-hint { margin-top: 8px; text-align: center; font-size: 11px; color: var(--text-tertiary); font-family: 'DM Mono',monospace; }

  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 600px) {
    #app { border-left: none; border-right: none; }

    /* safe area for notch & home indicator */
    #topbar { padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top)); }
    #inputbar { padding: 10px 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    #messages { padding: 16px 12px; }

    .bot-name { font-size: 14px; }
    .bubble { font-size: 13px; padding: 9px 12px; }
    .msg { max-width: 95%; }

    /* bigger tap targets */
    .round-btn, #send-btn { width: 42px; height: 42px; font-size: 17px; }
    .icon-btn { width: 36px; height: 36px; }

    /* hide hint text on small screen */
    .footer-hint { display: none; }

    /* suggestion pills wrap nicer */
    .suggestion-pills { gap: 6px; }
    .s-pill { font-size: 12px; padding: 6px 12px; }

    /* memory panel full width */
    .memory-inner { padding: 12px 16px; }
    #memory-input { font-size: 13px; }

    /* attach bar */
    #attach-bar { padding: 6px 12px 0; }
  }

  @media (max-width: 380px) {
    .empty-title { font-size: 16px; }
    .empty-sub { font-size: 12px; }
    .bubble { font-size: 13px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="topbar-left">
      <div class="bot-avatar">AI</div>
      <div class="bot-info">
        <div class="bot-name">Claude Sonnet 4.6</div>
        <div class="bot-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-label">Online</span>
        </div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="mem-btn" onclick="toggleMemory()" title="Memory">🧠</button>
      <button class="icon-btn" onclick="clearChat()" title="Clear chat">🗑</button>
    </div>
  </div>

  <div id="memory-panel">
    <div class="memory-inner">
      <div class="memory-title">🧠 Memory — Tersimpan Permanen</div>
      <div class="memory-chips" id="memory-chips"></div>
      <div class="memory-add-row">
        <input id="memory-input" placeholder='Contoh: "Nama saya Budi" atau "Saya suka Python"' />
        <button class="add-mem-btn" onclick="addMemory()">+ Simpan</button>
      </div>
    </div>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title">Halo! Gua Claude 👋</div>
      <div class="empty-sub">Kirim pesan, file, atau gambar. Memory aktif buat nyimpen konteks lo.</div>
      <div class="suggestion-pills">
        <span class="s-pill" onclick="suggest('Kenalin diri lo dong!')">Kenalin diri lo dong!</span>
        <span class="s-pill" onclick="suggest('Bantu gua belajar machine learning')">Belajar ML</span>
        <span class="s-pill" onclick="suggest('Analisa gambar ini buat gua')">Analisa gambar</span>
        <span class="s-pill" onclick="suggest('Buatin kode Python buat scraping')">Scraping Python</span>
      </div>
    </div>
  </div>

  <div id="attach-bar"></div>

  <div id="inputbar">
    <div class="input-row">
      <button class="round-btn" onclick="document.getElementById('file-input').click()" title="Attach">📎</button>
      <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.js,.py,.html,.css,.ts,.jsx,.tsx" onchange="onFileSelect(event)" />
      <textarea id="msg-input" placeholder="Ketik pesan... (Enter kirim, Shift+Enter baris baru)" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <div class="footer-hint">claude-sonnet-4-6 · memory on · file + image support</div>
  </div>
</div>

<script>
const API_ENDPOINT = '/api/chat'; // → Vercel serverless function

let history = [];
let memories = JSON.parse(localStorage.getItem('claude_memories') || '["Bahasa default: Bahasa Indonesia"]');
let staged = [];
let busy = false;

// ── MEMORY ──
function saveMemories() { localStorage.setItem('claude_memories', JSON.stringify(memories)); }
function renderMemChips() {
  const el = document.getElementById('memory-chips');
  if (!memories.length) { el.innerHTML = '<span class="memory-empty">Belum ada memory</span>'; return; }
  el.innerHTML = memories.map((m,i) => `<div class="memory-chip"><span>${esc(m)}</span><span class="chip-del" onclick="removeMem(${i})">✕</span></div>`).join('');
}
function addMemory() {
  const inp = document.getElementById('memory-input');
  const val = inp.value.trim(); if (!val) return;
  memories.push(val); saveMemories(); renderMemChips(); inp.value = '';
}
function removeMem(i) { memories.splice(i,1); saveMemories(); renderMemChips(); }
document.getElementById('memory-input').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();addMemory();} });
function toggleMemory() {
  document.getElementById('memory-panel').classList.toggle('open');
  document.getElementById('mem-btn').classList.toggle('active');
  renderMemChips();
}
renderMemChips();

// ── FILES ──
function onFileSelect(e) { Array.from(e.target.files).forEach(processFile); e.target.value=''; }
function processFile(file) {
  const isImg = file.type.startsWith('image/');
  const reader = new FileReader();
  reader.onload = ev => {
    if (isImg) staged.push({ kind:'image', name:file.name, dataUrl:ev.target.result, b64:ev.target.result.split(',')[1], mime:file.type });
    else staged.push({ kind:'file', name:file.name, content:ev.target.result });
    renderAttachBar();
  };
  isImg ? reader.readAsDataURL(file) : reader.readAsText(file);
}
function renderAttachBar() {
  const bar = document.getElementById('attach-bar');
  if (!staged.length) { bar.className=''; bar.innerHTML=''; bar.style.display='none'; return; }
  bar.style.display='flex'; bar.className='visible';
  bar.innerHTML = staged.map((f,i) => f.kind==='image'
    ? `<div class="a-chip"><img class="a-chip-img" src="${f.dataUrl}"/><span>${esc(f.name)}</span><span class="a-chip-remove" onclick="removeStaged(${i})">✕</span></div>`
    : `<div class="a-chip"><span>📄</span><span>${esc(f.name)}</span><span class="a-chip-remove" onclick="removeStaged(${i})">✕</span></div>`
  ).join('');
}
function removeStaged(i) { staged.splice(i,1); renderAttachBar(); }

// ── CHAT ──
function buildSystemPrompt() {
  let s = `Kamu adalah asisten AI yang cerdas, ramah, dan sedikit humoris. Jawab dalam Bahasa Indonesia kecuali user menulis dalam bahasa lain.`;
  if (memories.length) s += `\n\nInfo tentang user:\n` + memories.map(m=>`- ${m}`).join('\n');
  return s;
}
function buildUserContent(text) {
  if (!staged.length && text) return text;
  const parts = [];
  staged.forEach(f => {
    if (f.kind==='image') parts.push({ type:'image', source:{ type:'base64', media_type:f.mime, data:f.b64 } });
    else parts.push({ type:'text', text:`[File: ${f.name}]\n${f.content}` });
  });
  if (text) parts.push({ type:'text', text });
  return parts.length===1 && parts[0].type==='text' ? parts[0].text : parts;
}
function setStatus(label, loading=false) {
  document.getElementById('status-label').textContent = label;
  document.getElementById('status-dot').className = 'status-dot' + (loading ? ' loading' : '');
}

async function sendMessage() {
  if (busy) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !staged.length) return;

  const myAttach = [...staged];
  addMsgToUI('user', text, myAttach);
  history.push({ role:'user', content: buildUserContent(text) });

  input.value=''; autoResize(input);
  staged=[]; renderAttachBar();

  busy=true;
  document.getElementById('send-btn').disabled=true;
  setStatus('Menulis...', true);

  const typingEl = addTyping();

  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: buildSystemPrompt(),
        messages: history
      })
    });
    const data = await res.json();
    typingEl.remove();
    if (data.error) throw new Error(data.error);
    const reply = data.content.map(b=>b.text||'').join('');
    addMsgToUI('assistant', reply);
    history.push({ role:'assistant', content:reply });

    // auto-save name
    const nm = text.match(/(?:nama\s+(?:saya|aku|gua|gw)|panggil\s+(?:saya|aku|gua|gw))\s+(?:adalah\s+)?(\w+)/i);
    if (nm) { const e=`Nama user: ${nm[1]}`; if(!memories.includes(e)){memories.push(e);saveMemories();} }

    setStatus('Online', false);
  } catch(err) {
    typingEl.remove();
    addMsgToUI('assistant', `⚠️ Error: ${err.message}`);
    setStatus('Error', false);
  }

  busy=false;
  document.getElementById('send-btn').disabled=false;
}

function suggest(text) { document.getElementById('msg-input').value=text; sendMessage(); }
function clearChat() {
  if(!confirm('Hapus semua percakapan? Memory tetap tersimpan.')) return;
  history=[];
  document.getElementById('messages').innerHTML=`
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✓</div>
      <div class="empty-title">Chat dihapus!</div>
      <div class="empty-sub">Memory tetap tersimpan. Mulai percakapan baru.</div>
      <div class="suggestion-pills">
        <span class="s-pill" onclick="suggest('Kenalin diri lo dong!')">Kenalin diri</span>
        <span class="s-pill" onclick="suggest('Bantu gua belajar sesuatu')">Belajar sesuatu</span>
      </div>
    </div>`;
}

// ── UI HELPERS ──
function addMsgToUI(role, text, attachments=[]) {
  const es=document.getElementById('empty-state'); if(es) es.remove();
  const msgs=document.getElementById('messages');
  const wrap=document.createElement('div');
  wrap.className=`msg ${role}`;
  let attachHTML='';
  attachments.forEach(a => {
    if(a.kind==='image') attachHTML+=`<div class="attach-img-preview"><img src="${a.dataUrl}" loading="lazy"/></div>`;
    else attachHTML+=`<div class="attach-file-preview"><span>📄</span><span>${esc(a.name)}</span></div>`;
  });
  wrap.innerHTML=`
    <div class="msg-avatar">${role==='assistant'?'AI':'U'}</div>
    <div class="msg-body">
      ${attachments.length?`<div class="msg-attachments">${attachHTML}</div>`:''}
      <div class="bubble">${md(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
}
function addTyping() {
  const es=document.getElementById('empty-state'); if(es) es.remove();
  const msgs=document.getElementById('messages');
  const wrap=document.createElement('div');
  wrap.className='msg typing-row';
  wrap.innerHTML=`<div class="msg-avatar">AI</div><div class="msg-body"><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div>`;
  msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;
  return wrap;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(text) {
  let s=esc(text);
  s=s.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.*?)\*/g,'<em>$1</em>');
  s=s.replace(/^### (.+)$/gm,'<strong>$1</strong>');
  s=s.replace(/^## (.+)$/gm,'<strong style="font-size:15px">$1</strong>');
  s=s.replace(/^\s*[-*] (.+)$/gm,'<li>$1</li>');
  s=s.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  s=s.replace(/\n/g,'<br>');
  s=s.replace(/<pre>([\s\S]*?)<\/pre>/g,(_,c)=>`<pre>${c.replace(/<br>/g,'\n').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&')}</pre>`);
  return s;
}
function now() { return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
</script>
